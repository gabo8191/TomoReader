<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="TomoReader">
  <defs>
    <linearGradient id="bg" x1="64" y1="48" x2="448" y2="464" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5B4BE0" />
      <stop offset="1" stop-color="#2E2470" />
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.55">
      <stop stop-color="#FFD79A" stop-opacity="0.55" />
      <stop offset="1" stop-color="#FFD79A" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="pageL" x1="120" y1="150" x2="256" y2="392" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFBF2" />
      <stop offset="1" stop-color="#F3E7CC" />
    </linearGradient>
    <linearGradient id="pageR" x1="392" y1="150" x2="256" y2="392" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFDF8" />
      <stop offset="1" stop-color="#F7EED8" />
    </linearGradient>
    <linearGradient id="ribbon" x1="256" y1="150" x2="256" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF9A3D" />
      <stop offset="1" stop-color="#F2612E" />
    </linearGradient>
  </defs>

  <!-- Fondo squircle -->
  <rect x="32" y="32" width="448" height="448" rx="120" fill="url(#bg)" />
  <!-- Resplandor cálido (lectura cómoda) -->
  <rect x="32" y="32" width="448" height="448" rx="120" fill="url(#glow)" />

  <!-- Sombra suave del libro -->
  <ellipse cx="256" cy="398" rx="150" ry="26" fill="#1B1545" fill-opacity="0.35" />

  <!-- Libro abierto: dos páginas -->
  <g stroke="#2E2470" stroke-width="10" stroke-linejoin="round">
    <path d="M256 168 C212 142 160 140 116 152 V370 C160 358 212 360 256 386 Z" fill="url(#pageL)" />
    <path d="M256 168 C300 142 352 140 396 152 V370 C352 358 300 360 256 386 Z" fill="url(#pageR)" />
  </g>

  <!-- Líneas de texto sugeridas -->
  <g stroke="#C9B68C" stroke-width="9" stroke-linecap="round">
    <line x1="150" y1="196" x2="226" y2="208" />
    <line x1="150" y1="232" x2="226" y2="244" />
    <line x1="150" y1="268" x2="214" y2="278" />
    <line x1="286" y1="208" x2="362" y2="196" />
    <line x1="286" y1="244" x2="362" y2="232" />
    <line x1="286" y1="278" x2="350" y2="268" />
  </g>

  <!-- Marcapáginas -->
  <path d="M256 150 V300 L284 276 L312 300 V150 Z" fill="url(#ribbon)" stroke="#2E2470" stroke-width="8" stroke-linejoin="round" />
</svg>
