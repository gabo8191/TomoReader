<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tomo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2B2545" />
      <stop offset="1" stop-color="#1A1730" />
    </linearGradient>
    <linearGradient id="page" x1="120" y1="96" x2="392" y2="416" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBF3E0" />
      <stop offset="1" stop-color="#F2E3C2" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F5A623" />
      <stop offset="1" stop-color="#E8743B" />
    </linearGradient>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="512" height="512" rx="112" fill="url(#bg)" />

  <!-- Lomo del libro / cómic -->
  <rect x="116" y="92" width="280" height="328" rx="22" fill="url(#page)" />
  <rect x="116" y="92" width="36" height="328" rx="14" fill="#D9C49A" />

  <!-- Paneles de cómic en la página -->
  <g stroke="#2B2545" stroke-width="11" stroke-linejoin="round">
    <rect x="176" y="128" width="180" height="96" rx="10" fill="#F5A623" fill-opacity="0.18" />
    <rect x="176" y="240" width="80" height="144" rx="10" fill="#E8743B" fill-opacity="0.16" />
    <rect x="276" y="240" width="80" height="144" rx="10" fill="#3DA9A3" fill-opacity="0.18" />
  </g>

  <!-- Marca de acento: "viñeta de acción" -->
  <path d="M308 150 L332 162 L320 176 L344 190 L300 206 L312 188 L292 178 Z"
        fill="url(#accent)" stroke="#2B2545" stroke-width="6" stroke-linejoin="round" />
</svg>
